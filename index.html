<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CookVault – Your Personal Recipe Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <noscript>Enable JavaScript to run CookVault.</noscript>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if (window.location.protocol === 'file:') {
        document.getElementById('root').innerHTML = '<p style="padding:2rem;font-family:system-ui;">Open CookVault with a dev server: run <code>npm run dev</code> in the project folder, then open <a href="http://localhost:5173">http://localhost:5173</a>.</p>';
      } else {
        setTimeout(function() {
          var r = document.getElementById('root');
          if (r && !r.hasChildNodes()) {
            r.innerHTML = '<p style="padding:2rem;font-family:system-ui;">Loading… If this stays, run <code>npm run dev</code> and open <a href="http://localhost:5173">http://localhost:5173</a>.</p>';
          }
        }, 5000);
      }
    </script>
  </body>
</html>
